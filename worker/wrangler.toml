name = "mentionwatch-api"
main = "src/index.ts"
compatibility_date = "2026-04-10"

[triggers]
crons = ["*/5 * * * *"]  # Every 5 minutes

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
STRIPE_WEBHOOK_SECRET = ""
LANDING_URL = "https://mentionwatch.com"

# Set these as secrets via: wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
